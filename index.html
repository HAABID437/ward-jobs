<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f5ece0">
<title>Axonal — Shift task manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{
  background:#f5ece0;
  font-family:'DM Sans',system-ui,sans-serif;
  color:#1c1917;
  min-height:100vh;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:20px 24px;
  overflow-x:hidden;
}

/* ── Asterisk icon ── */
.icon-wrap{
  position:relative;
  width:min(80vw,340px);
  height:min(80vw,340px);
  margin:0 auto 16px;
}
.asterisk{width:min(80vw,340px);height:min(80vw,340px);transform-origin:center}

/* ── Text ── */
.brand{
  text-align:center;
  margin-bottom:28px;
}
.brand-name{
  font-family:'DM Serif Display',serif;
  font-size:clamp(26px,6vw,36px);
  font-weight:400;
  letter-spacing:-0.03em;
  line-height:1;
  margin-bottom:7px;
  opacity:0;
  transform:translateY(16px);
  animation:rise 0.8s cubic-bezier(0.22,1,0.36,1) 0.3s forwards;
}
.brand-sub{
  font-size:clamp(11px,2.5vw,13px);
  color:#78716c;
  font-weight:400;
  font-style:italic;
  font-family:'DM Serif Display',serif;
  letter-spacing:0.01em;
  opacity:0;
  animation:rise 0.8s cubic-bezier(0.22,1,0.36,1) 0.5s forwards;
}

/* ── Feature pills ── */
.features{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  justify-content:center;
  max-width:320px;
  margin:0 auto 36px;
  opacity:0;
  animation:rise 0.8s cubic-bezier(0.22,1,0.36,1) 0.7s forwards;
}
.feat{
  display:flex;
  align-items:center;
  gap:6px;
  padding:5px 11px;
  background:#fff;
  border-radius:24px;
  font-size:11px;
  font-weight:500;
  color:#44403c;
  box-shadow:0 1px 6px rgba(60,30,10,0.07);
}
.feat-dot{
  width:6px;
  height:6px;
  border-radius:50%;
  flex-shrink:0;
}
.cta-wrap{
  text-align:center;
  opacity:0;
  animation:rise 0.8s cubic-bezier(0.22,1,0.36,1) 0.9s forwards;
}
.cta{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:12px 24px;
  background:#1c1917;
  color:#f5ece0;
  font-family:'DM Sans',sans-serif;
  font-size:13px;
  font-weight:600;
  border-radius:50px;
  text-decoration:none;
  box-shadow:0 4px 20px rgba(28,25,23,0.2);
  transition:transform 0.18s ease,box-shadow 0.18s ease,opacity 0.18s;
}
.cta:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 28px rgba(28,25,23,0.25);
}
.cta:active{transform:scale(0.97);opacity:0.85}
.cta svg{
  width:13px;height:13px;
  stroke:#f5ece0;stroke-width:2;fill:none;
  transition:transform 0.18s ease;
}
.cta:hover svg{transform:translateX(3px)}
.cta-note{
  margin-top:10px;
  font-size:10px;
  color:#a8a29e;
  font-weight:500;
}


@keyframes rise{
  to{opacity:1;transform:translateY(0)}
}

/* ── Subtle bg grain texture ── */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;
  z-index:0;
}
body>*{position:relative;z-index:1}
</style>
</head>
<body>

<div class="icon-wrap">
  <canvas id="axon" width="680" height="680" style="width:min(80vw,340px);height:min(80vw,340px)"></canvas>
</div>

<div class="brand">
  <div class="brand-name">Axonal</div>
  <div class="brand-sub">Shift task manager for clinicians</div>
</div>

<div class="features">
  <div class="feat"><span class="feat-dot" style="background:#c0392b"></span>Prioritised job list</div>
  <div class="feat"><span class="feat-dot" style="background:#92620a"></span>Instant QR handover</div>
  <div class="feat"><span class="feat-dot" style="background:#2d7a55"></span>Session-safe &amp; private</div>
</div>

<div class="cta-wrap">
  <a href="./app.html" class="cta">
    Open Axonal
    <svg viewBox="0 0 16 16"><line x1="3" y1="8" x2="13" y2="8"/><polyline points="9,4 13,8 9,12"/></svg>
  </a>
  <div class="cta-note">Free &middot; No login &middot; No data stored</div>
</div>

<script>
(function(){
  const canvas = document.getElementById('axon');
  const ctx = canvas.getContext('2d');
  const W = 680, H = 680;
  const N = 36;
  const MAX_DIST = 240;
  const TRI_DIST = 170;

  // Color palette — deep navy bg, cyan-blue and rose nodes/lines
  const BG        = '#1a1628';
  const COL_A     = [120, 200, 255];  // cyan-blue
  const COL_B     = [200,  90, 220];  // magenta-purple
  const COL_C     = [255, 120, 180];  // rose

  function lerp(a, b, t){ return a + (b-a)*t; }
  function lerpCol(a, b, t){
    return [lerp(a[0],b[0],t), lerp(a[1],b[1],t), lerp(a[2],b[2],t)];
  }
  function rgba(c, a){ return `rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`; }

  // Create nodes
  const nodes = Array.from({length:N}, (_,i) => ({
    x: 30 + Math.random() * (W-60),
    y: 30 + Math.random() * (H-60),
    vx: (Math.random()-0.5) * 0.5,
    vy: (Math.random()-0.5) * 0.5,
    r: 2.5 + Math.random() * 2.5,
    t: Math.random(), // color blend 0=COL_A, 1=COL_B
    phase: Math.random() * Math.PI * 2
  }));

  let start = null;
  function draw(ts){
    if(!start) start = ts;
    const t = (ts - start) / 1000;

    ctx.clearRect(0, 0, W, H);

    // move nodes
    nodes.forEach(n => {
      n.x += n.vx;
      n.y += n.vy;
      // soft bounce
      if(n.x < 20 || n.x > W-20) n.vx *= -1;
      if(n.y < 20 || n.y > H-20) n.vy *= -1;
    });

    // draw triangles for close triplets
    for(let i=0; i<N-2; i++){
      for(let j=i+1; j<N-1; j++){
        const dx1 = nodes[j].x-nodes[i].x, dy1 = nodes[j].y-nodes[i].y;
        if(Math.hypot(dx1,dy1) > TRI_DIST) continue;
        for(let k=j+1; k<N; k++){
          const dx2 = nodes[k].x-nodes[i].x, dy2 = nodes[k].y-nodes[i].y;
          const dx3 = nodes[k].x-nodes[j].x, dy3 = nodes[k].y-nodes[j].y;
          if(Math.hypot(dx2,dy2) > TRI_DIST || Math.hypot(dx3,dy3) > TRI_DIST) continue;
          const avgT = (nodes[i].t + nodes[j].t + nodes[k].t) / 3;
          const col = avgT < 0.5 ? lerpCol(COL_A, COL_B, avgT*2) : lerpCol(COL_B, COL_C, (avgT-0.5)*2);
          ctx.beginPath();
          ctx.moveTo(nodes[i].x, nodes[i].y);
          ctx.lineTo(nodes[j].x, nodes[j].y);
          ctx.lineTo(nodes[k].x, nodes[k].y);
          ctx.closePath();
          ctx.fillStyle = rgba(col, 0.06);
          ctx.fill();
        }
      }
    }

    // draw lines between close nodes
    for(let i=0; i<N-1; i++){
      for(let j=i+1; j<N; j++){
        const dx = nodes[j].x-nodes[i].x, dy = nodes[j].y-nodes[i].y;
        const dist = Math.hypot(dx,dy);
        if(dist > MAX_DIST) continue;
        const alpha = (1 - dist/MAX_DIST) * 0.55;
        const avgT = (nodes[i].t + nodes[j].t) / 2;
        const col = avgT < 0.5 ? lerpCol(COL_A, COL_B, avgT*2) : lerpCol(COL_B, COL_C, (avgT-0.5)*2);
        ctx.beginPath();
        ctx.moveTo(nodes[i].x, nodes[i].y);
        ctx.lineTo(nodes[j].x, nodes[j].y);
        ctx.strokeStyle = rgba(col, alpha);
        ctx.lineWidth = 0.8;
        ctx.stroke();
      }
    }

    // draw nodes
    nodes.forEach((n,i) => {
      const pulse = 0.7 + 0.3 * Math.sin(t * 1.2 + n.phase);
      const col = n.t < 0.5 ? lerpCol(COL_A, COL_B, n.t*2) : lerpCol(COL_B, COL_C, (n.t-0.5)*2);
      // glow
      const g = ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*5*pulse);
      g.addColorStop(0, rgba(col, 0.5));
      g.addColorStop(1, rgba(col, 0));
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r*5*pulse, 0, Math.PI*2);
      ctx.fillStyle = g;
      ctx.fill();
      // core dot
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r*pulse, 0, Math.PI*2);
      ctx.fillStyle = rgba(col, 0.9);
      ctx.fill();
    });

    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
